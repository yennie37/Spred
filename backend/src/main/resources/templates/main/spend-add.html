<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지출 추가하기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="../../../../../../frontend/src/assets/css/content.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f7;
            padding-bottom: 80px;
        }

        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .required {
            color: #e53e3e;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s ease;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #FF6600;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .category-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-btn:hover {
            border-color: #FF6600;
        }

        .category-btn.selected {
            border-color: #FF6600;
            background: #fff8f0;
        }

        .category-icon {
            font-size: 32px;
        }

        .category-label {
            font-size: 13px;
            font-weight: 500;
            color: #666;
        }

        .category-btn.selected .category-label {
            color: #FF6600;
        }

        .amount-input-wrapper {
            position: relative;
        }

        .amount-input {
            text-align: right;
            font-size: 24px;
            font-weight: 700;
            padding-right: 40px;
        }

        .currency {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #999;
            font-weight: 600;
        }

        .photo-upload {
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .photo-upload:hover {
            border-color: #FF6600;
            background: #fff8f0;
        }

        .photo-upload-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .photo-upload-text {
            font-size: 14px;
            color: #666;
        }

        .helper-text {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .quick-amount-btn {
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-amount-btn:hover {
            border-color: #FF6600;
            color: #FF6600;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF6600, #ff8533);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 102, 0, 0.4);
        }

        .date-time-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
        }
    </style>
</head>
<body>
<div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="header-title">지출 추가하기</div>
</div>

<div class="container">
    <form id="expenseForm">
        <!-- 분류 선택 -->
        <div class="form-section">
            <div class="section-title">💳 분류 선택</div>

            <div class="category-grid">
                <button type="button" class="category-btn selected" data-category="ticket">
                    <div class="category-icon">🎫</div>
                    <div class="category-label">티켓</div>
                </button>
                <button type="button" class="category-btn" data-category="goods">
                    <div class="category-icon">🎁</div>
                    <div class="category-label">굿즈</div>
                </button>
                <button type="button" class="category-btn" data-category="food">
                    <div class="category-icon">🍔</div>
                    <div class="category-label">식비</div>
                </button>
                <button type="button" class="category-btn" data-category="transport">
                    <div class="category-icon">🚗</div>
                    <div class="category-label">교통비</div>
                </button>
                <button type="button" class="category-btn" data-category="accommodation">
                    <div class="category-icon">🏨</div>
                    <div class="category-label">숙박비</div>
                </button>
                <button type="button" class="category-btn" data-category="etc">
                    <div class="category-icon">📝</div>
                    <div class="category-label">기타</div>
                </button>
            </div>
        </div>

        <!-- 기본 정보 -->
        <div class="form-section">
            <div class="section-title">📋 기본 정보</div>

            <div class="form-group">
                <label class="form-label">날짜 <span class="required">*</span></label>
                <input type="date" class="form-input" value="2025-04-05" required>
            </div>

            <div class="form-group">
                <label class="form-label">사용처</label>
                <input type="text" class="form-input" placeholder="예: 한화생명 이글스파크">
            </div>

            <div class="form-group">
                <label class="form-label">내용 <span class="required">*</span></label>
                <input type="text" class="form-input" placeholder="예: 1루 내야지정석" required>
            </div>
        </div>

        <!-- 금액 -->
        <div class="form-section">
            <div class="section-title">💰 금액</div>

            <div class="form-group">
                <label class="form-label">금액 <span class="required">*</span></label>
                <div class="amount-input-wrapper">
                    <input type="number" class="form-input amount-input" id="amountInput" placeholder="0" value="35000" required>
                    <span class="currency">원</span>
                </div>
                <div class="quick-amounts">
                    <button type="button" class="quick-amount-btn" onclick="setAmount(10000)">+1만</button>
                    <button type="button" class="quick-amount-btn" onclick="setAmount(5000)">+5천</button>
                    <button type="button" class="quick-amount-btn" onclick="setAmount(1000)">+1천</button>
                    <button type="button" class="quick-amount-btn" onclick="clearAmount()">초기화</button>
                </div>
            </div>
        </div>

        <!-- 추가 정보 -->
        <div class="form-section">
            <div class="section-title">📝 추가 정보</div>

            <div class="form-group">
                <label class="form-label">메모</label>
                <textarea class="form-textarea" placeholder="메모를 남겨보세요"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">영수증/사진 첨부</label>
                <div class="photo-upload" onclick="document.getElementById('receiptInput').click()">
                    <div class="photo-upload-icon">📸</div>
                    <div class="photo-upload-text">영수증이나 사진을 추가해보세요</div>
                </div>
                <input type="file" id="receiptInput" accept="image/*" multiple style="display: none;">
            </div>
        </div>

        <button type="submit" class="submit-btn">저장하기</button>
    </form>
</div>

<script>
        // 분류 버튼 선택
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // 금액 빠른 입력
        function setAmount(value) {
            const input = document.getElementById('amountInput');
            const currentValue = parseInt(input.value) || 0;
            input.value = currentValue + value;
        }

        function clearAmount() {
            document.getElementById('amountInput').value = '';
        }

        // 폼 제출
        document.getElementById('expenseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('지출 기록이 저장되었습니다! 💰');
            window.location.href = 'expense-list.html';
        });

        function goBack() {
            window.history.back();
        }

        // 숫자 입력시 천 단위 콤마 (선택사항)
        document.getElementById('amountInput').addEventListener('input', function(e) {
            let value = this.value.replace(/,/g, '');
            if (!isNaN(value) && value !== '') {
                this.value = parseInt(value);
            }
        });
    </script>
</body>
</html>
